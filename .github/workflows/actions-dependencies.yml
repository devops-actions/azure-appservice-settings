
name: Submit Actions Dependencies
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1' # Weekly

permissions:
  contents: read

jobs:
  submit-dependencies:
    uses: devops-actions/.github/.github/workflows/actions-dependencies.yml@3bb5c8505eb368f90cf87956f0cc4d84cb8554d1 # main
    permissions:
      contents: write # Required for the dependency submission API
      id-token: write # Required for dependency submission
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
