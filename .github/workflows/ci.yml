name: CI
on:
  push: 
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_test_job:
    name: 'Build and test job'
    runs-on: ${{ matrix.os }}
    strategy:
        fail-fast: false
        matrix:
          os: [windows-latest, ubuntu-latest, macos-latest]        
    steps:

    - name: 'Checking out repo code'
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: 'Setup Node.js'
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '24'

    - name: 'Validate build'
      run: |
        npm ci
        npm run build

    - name: 'Run L0 tests'
      run: |
        npm run test

    # validate if the dist folder has no changes that are not commited
    - name: Check for uncommitted changes
      # Compare using git's normalized (eol=lf) content so CRLF differences between
      # platforms don't cause false failures. We stage the freshly-built file (which
      # applies the eol=lf normalization from .gitattributes) then diff against HEAD.
      if: runner.os != 'Windows'
      shell: bash
      run: |
        git add dist/index.js
        if git diff --cached --quiet -- dist/index.js; then
          echo "dist folder has no changes"
          git restore --staged dist/index.js
        else
          echo "dist folder has changes that are not committed:"
          git diff --cached --stat -- dist/index.js
          git restore --staged dist/index.js
          exit 1
        fi
